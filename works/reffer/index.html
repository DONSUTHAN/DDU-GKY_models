<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>operation</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="container">
        <section>
            <div class="head">
                <h1>aray operation</h1>
            </div>
            <div class="output_board">
                <h4 id="result"></h4>
            </div>
            <div class="input_main">
                <div class="input_sub">
                    <P>Enter  a number</P>
                </div>
                <input type="text" id="array_ip" placeholder="enter a number">
            </div>
            <div class="open_button">
                <button type="button" id="fremove">REmove number from fist</button>
                <button type="button" id="fadd_btn">Add number from first</button>
                <button type="button" id="ladd_btn">Add number from last</button>
                <button type="button" id="lremove_btn">REmove number from last</button>
             </div>

             <div class="output_board">
                <h4 id="output_board"></h4>
             </div>
             <div class="open_button">
                <button type="button" id="splice_btn">splice</button>
                <button type="button" id="foreach_btn">Add number from first</button>
                <button type="button" id="ladd_btn">Add number from last</button>
                <button type="button" id="lremove_btn">REmove number from last</button>
             </div>
        </section>
    </div>
    <script src="./script.js"></script>
</body>
</html>
